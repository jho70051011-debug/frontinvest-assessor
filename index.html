<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Front Invest — Registro Diário</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCI6F7O1YkeAheLZRmqJ94cbVtZWJHfeoo",
  authDomain: "frontinvest-crm.firebaseapp.com",
  databaseURL: "https://frontinvest-crm-default-rtdb.firebaseio.com",
  projectId: "frontinvest-crm",
  storageBucket: "frontinvest-crm.firebasestorage.app",
  messagingSenderId: "557480741861",
  appId: "1:557480741861:web:0804c6d1921f64279dfd0c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Salva nome do assessor
function getNome() { return localStorage.getItem('fi_nome') || ''; }
function setNome(n) { localStorage.setItem('fi_nome', n); }

// SIMILARIDADE DE NOMES — evita duplicar assessores
function similarity(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  if (a === b) return 1;
  // verifica se um contém o outro
  if (a.includes(b) || b.includes(a)) return 0.9;
  // compara palavras individuais
  const wa = a.split(' ').filter(Boolean);
  const wb = b.split(' ').filter(Boolean);
  let matches = 0;
  wa.forEach(w => { if (wb.some(x => x.startsWith(w) || w.startsWith(x))) matches++; });
  return matches / Math.max(wa.length, wb.length);
}

async function resolverNome(nomeDigitado) {
  // Busca nomes já existentes no Firebase
  try {
    const snap = await get(ref(db, 'registros'));
    const nomesExistentes = new Set();
    if (snap.exists()) snap.forEach(c => { if (c.val().nome) nomesExistentes.add(c.val().nome); });
    const snap2 = await get(ref(db, 'reunioes'));
    if (snap2.exists()) snap2.forEach(c => { if (c.val().assessor) nomesExistentes.add(c.val().assessor); });

    // Verifica similaridade com cada nome existente
    let melhorNome = nomeDigitado;
    let melhorScore = 0;
    nomesExistentes.forEach(existente => {
      const score = similarity(nomeDigitado, existente);
      if (score > melhorScore) { melhorScore = score; melhorNome = existente; }
    });

    // Se similaridade >= 70%, usa o nome já existente
    if (melhorScore >= 0.7 && melhorNome !== nomeDigitado) {
      console.log(`Nome "${nomeDigitado}" → usando "${melhorNome}" (${Math.round(melhorScore*100)}% similar)`);
      return melhorNome;
    }
  } catch(e) { console.warn('Erro ao resolver nome:', e); }
  return nomeDigitado;
}

// SUBMIT DIÁRIO
window.salvarDiario = async function() {
  const nomeDigitado = document.getElementById('f-nome').value.trim();
  if (!nomeDigitado) { alert('Preencha seu nome.'); return; }
  const nome = await resolverNome(nomeDigitado);
  setNome(nome);
  // Atualiza campo com nome resolvido
  document.getElementById('f-nome').value = nome;
  document.getElementById('r-assessor').value = nome;

  const rec = {
    nome,
    data: new Date().toDateString(),
    dataMs: Date.now(),
    contatos: parseInt(document.getElementById('f-contatos').value) || 0,
    reunioes: parseInt(document.getElementById('f-reunioes').value) || 0,
    propostas: parseInt(document.getElementById('f-propostas').value) || 0,
    fechamentos: parseInt(document.getElementById('f-fechamentos').value) || 0,
    produto: document.getElementById('f-produto').value,
    volume: parseInt(document.getElementById('f-volume').value) || 0,
    dificuldade: document.getElementById('f-dificuldade').value,
    energia: parseInt(document.getElementById('f-energia').value) || 7,
    obs: document.getElementById('f-obs').value.trim()
  };

  try {
    await push(ref(db, 'registros'), rec);
    showSuccess('diario-ok', '✅ Registro diário salvo! Aparece no painel do líder agora.');
    // limpar campos
    ['f-contatos','f-reunioes','f-propostas','f-fechamentos','f-volume','f-obs'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

// SUBMIT REUNIÃO
window.salvarReuniao = async function() {
  const nomeDigitado = document.getElementById('r-assessor').value.trim() || getNome();
  if (!nomeDigitado) { alert('Preencha o nome do assessor.'); return; }
  const nome = await resolverNome(nomeDigitado);
  document.getElementById('r-assessor').value = nome;

  const clienteNome = document.getElementById('r-cliente-nome').value.trim();
  if (!clienteNome) { alert('Preencha o nome do cliente.'); return; }

  const reuniao = {
    assessor: nome,
    dataMs: Date.now(),
    data: new Date().toDateString(),
    // Dados do cliente
    clienteNome,
    clienteEmpresa: document.getElementById('r-cliente-empresa').value.trim(),
    clientePerfil: document.getElementById('r-cliente-perfil').value,
    clienteContato: document.getElementById('r-cliente-contato').value.trim(),
    // Dados da reunião
    tipo: document.getElementById('r-tipo').value,
    produto: document.getElementById('r-produto').value,
    volumeEstimado: parseInt(document.getElementById('r-volume').value) || 0,
    resultado: document.getElementById('r-resultado').value,
    objecao: document.getElementById('r-objecao').value,
    proximoPasso: document.getElementById('r-proximo').value.trim(),
    dataRetorno: document.getElementById('r-retorno').value,
    temperatura: document.getElementById('r-temperatura').value,
    obs: document.getElementById('r-obs').value.trim()
  };

  try {
    await push(ref(db, 'reunioes'), reuniao);
    showSuccess('reuniao-ok', '✅ Reunião registrada! Aparece na análise do painel do líder.');
    // limpar campos de reunião
    ['r-assessor','r-cliente-nome','r-cliente-empresa','r-cliente-contato','r-volume','r-proximo','r-retorno','r-obs'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

function showSuccess(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.style.display = 'none', 4000);
}

window.updE = function(v) {
  document.getElementById('eval').textContent = v;
  const EMS = {1:'Dia muito difícil 😔',2:'Bem abaixo 😔',3:'Abaixo do esperado 😕',4:'Razoável 😐',5:'Tá no caminho 🙂',6:'Bom 🙂',7:'Bom ritmo 💪',8:'Alta energia 🔥',9:'Dia excelente 🚀',10:'Fora de série 🏆'};
  document.getElementById('elbl').textContent = EMS[v] || '';
  const pct = ((v-1)/9)*100;
  document.getElementById('f-energia').style.background = `linear-gradient(to right,#b8912e 0%,#b8912e ${pct}%,#e2e0d8 ${pct}%)`;
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-' + tab).classList.add('on');
  document.getElementById('panel-' + tab).classList.add('on');
  event.currentTarget.classList.add('on');
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  const MOTIVS = ['Domingo é para recarregar. Amanhã a caça começa.','Segunda é o dia que separa quem quer de quem faz.','Terça de foco total. Cada reunião pode mudar seu ano.','Metade da semana. Hoje você vira o jogo.','Quinta é o melhor dia para fechar.','Sexta é colheita. Tudo que plantou matura hoje.','Sábado: quem trabalha agora não se preocupa com a concorrência.'];
  document.getElementById('dchip').textContent = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  document.getElementById('mmsg').textContent = MOTIVS[d.getDay()];
  const nome = getNome();
  if (nome) { document.getElementById('f-nome').value = nome; document.getElementById('r-assessor').value = nome; }
  updE(7);
});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f3ef;--bg2:#fff;--bg3:#eceae4;--bg4:#e2e0d8;
  --border:#e0ded6;--border2:#c8c6bc;
  --text:#16160e;--text2:#6b6b60;--text3:#aeada4;
  --gold:#8a6a1c;--gold2:#b8912e;--goldbg:#fdf5e0;--goldborder:#e8d080;
  --green:#15803d;--greenbg:#f0fdf4;--greenborder:#86efac;
  --red:#991b1b;--blue:#1d3fa8;--amber:#92400e;
  --r:12px;--rs:8px
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}

.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:9px}
.li{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#8a6a1c,#c9a84c);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ln{font-size:15px;font-weight:800;letter-spacing:-.03em}
.ls{font-size:10px;color:var(--text3);display:block}
.dchip{font-size:12px;color:var(--text2);background:var(--bg3);padding:5px 12px;border-radius:99px;border:1px solid var(--border)}

.wrap{max-width:580px;margin:0 auto;padding:20px 16px 100px}

.motiv{background:var(--goldbg);border:1px solid var(--goldborder);border-left:4px solid var(--gold2);border-radius:var(--r);padding:14px 16px;margin-bottom:20px}
.mt{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2);font-weight:700;margin-bottom:5px}
.mb{font-size:13px;color:var(--gold);line-height:1.6;font-weight:500}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);background:none;border:none;font-family:'Outfit',sans-serif;transition:all .15s;text-align:center}
.tab-btn.on{background:var(--text);color:var(--bg2)}
.tab-panel{display:none}.tab-panel.on{display:block}

.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.stitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding-bottom:11px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.stitle svg{width:13px;height:13px;flex-shrink:0;opacity:.6}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
label{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:5px}
.sub{font-size:11px;color:var(--text3);display:block;margin-bottom:4px}
input,select,textarea{display:block;width:100%;padding:10px 12px;font-size:14px;font-family:'Outfit',sans-serif;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rs);color:var(--text);appearance:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold2);box-shadow:0 0 0 3px rgba(184,145,46,.1);background:var(--bg2)}
input[type=number]{font-weight:600;font-size:16px}
textarea{resize:vertical;min-height:68px;font-size:13px;line-height:1.55}

/* TEMPERATURA */
.temp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.temp-btn{padding:10px 6px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-align:center;transition:all .15s;color:var(--text2)}
.temp-btn.sel-q{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.temp-btn.sel-m{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.temp-btn.sel-f{background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}

/* SLIDER */
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:5px}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:99px;background:var(--bg3);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold2);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sl-val{font-size:22px;font-weight:800;min-width:28px;text-align:right}
.sl-lbl{font-size:12px;color:var(--text2)}

.sbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:var(--text);color:var(--bg2);border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .15s;margin-top:4px}
.sbtn:active{opacity:.8}
.sbtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:white}

.success-msg{display:none;background:var(--greenbg);border:1.5px solid var(--greenborder);border-radius:var(--r);padding:14px 16px;font-size:14px;font-weight:600;color:var(--green);text-align:center;margin-top:12px}

/* TEMPERATURA SELECT */
.temp-wrap{display:flex;gap:6px;margin-top:4px}
.topt{flex:1;padding:9px 4px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-align:center;transition:all .15s;color:var(--text2)}
.topt:hover{border-color:var(--border2)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="li"><svg viewBox="0 0 16 16"><polyline points="1,12 5,7 9,9.5 15,3"/><polyline points="11,3 15,3 15,7"/></svg></div>
    <div><span class="ln">Front Invest</span><span class="ls">Registro do assessor</span></div>
  </div>
  <div class="dchip" id="dchip"></div>
</div>

<div class="wrap">

  <div class="motiv">
    <div class="mt">💬 Motivação do dia</div>
    <div class="mb" id="mmsg"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn on" id="tab-diario" onclick="switchTab('diario')">📋 Registro diário</button>

    <div class="sec">
      <div class="stitle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2.5 1.5"/></svg>Resultado financeiro</div>
      <div class="field">

  </div>

  <!-- ===== PAINEL REUNIÃO ===== -->
  <div class="tab-panel" id="panel-reuniao">

    <div class="sec">
      <div class="stitle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="5.5" r="3"/><path d="M2 14.5c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>Assessor responsável</div>
      <div class="field">
        <label>Seu nome</label>
        <input type="text" id="r-assessor" placeholder="Nome do assessor">
      </div>
    </div>

    <div class="sec">
      <div class="stitle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M8 5v6"/></svg>Ficha do cliente</div>
      <div class="field">
        <label>Nome do cliente</label>
        <input type="text" id="r-cliente-nome" placeholder="Nome completo">
      </div>
      <div class="field">
        <label>Empresa / Profissão</label>
        <input type="text" id="r-cliente-empresa" placeholder="Ex: Dono de padaria, Médico, Engenheiro...">
      </div>
      <div class="row2">
        <div class="field">

          <select id="r-cliente-perfil">
            <option value="">Selecionar...</option>
            <option>Assalariado</option>

            <option>Empresário — pequeno</option>
            <option>Empresário — médio/grande</option>
            <option>Investidor</option>
            <option>Aposentado</option>
          </select>
        </div>
        <div class="field">
          <label>Contato (WhatsApp)</label>
          <input type="text" id="r-cliente-contato" placeholder="(xx) xxxxx-xxxx" inputmode="tel">
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="stitle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 5h12v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5z"/><path d="M2 5l6-3 6 3"/></svg>Dados da reunião</div>
      <div class="row2">
        <div class="field">
          <label>Tipo de reunião</label>
          <select id="r-tipo">
            <option>Primeiro contato</option>
            <option>Apresentação de proposta</option>
            <option>Follow-up</option>
            <option>Fechamento</option>
            <option>Pós-venda</option>
          </select>
        </div>
        <div class="field">
          <label>Produto abordado</label>
          <select id="r-produto">
            <option value="">Selecionar...</option>
            <option>Mercado livre de energia</option>
            <option>Investimentos — renda fixa</option>
            <option>Investimentos — renda variável</option>
            <option>Cartão Front Invest</option>
            <option>Conta bancária</option>
            <option>Seguro de vida</option>
            <option>Seguro veicular</option>
            <option>Plano de saúde</option>
            <option>Previdência privada</option>
            <option>Consórcio — imóvel</option>
            <option>Consórcio — veículo</option>
            <option>Crédito / financiamento</option>
            <option>Múltiplos produtos</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Volume estimado (R$)</label>
          <input type="number" id="r-volume" min="0" placeholder="0" inputmode="numeric">
        </div>
        <div class="field">
          <label>Resultado</label>
          <select id="r-resultado">
            <option>Proposta enviada</option>
            <option>Fechado ✅</option>
            <option>Retornar</option>
            <option>Sem interesse</option>
            <option>Aguardando decisão</option>
            <option>Reagendar</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Principal objeção enfrentada</label>
        <select id="r-objecao">
          <option value="">Nenhuma objeção</option>
          <option>Preço / custo</option>
          <option>Não tem tempo agora</option>
          <option>Precisa consultar sócio / cônjuge</option>
          <option>Não confia / quer pesquisar</option>
          <option>Já tem outro fornecedor</option>
          <option>Sem urgência</option>
          <option>Não entendeu o produto</option>
          <option>Outra</option>
        </select>
      </div>
      <div class="field">
        <label>Temperatura do cliente</label>
        <div class="temp-wrap">
          <button class="topt" id="t-q" onclick="setTemp('Quente 🔥')" style="background:#fee2e2;border-color:#fca5a5;color:#991b1b">🔥 Quente</button>
          <button class="topt" id="t-m" onclick="setTemp('Morno ⏳')" style="background:#fef3c7;border-color:#fcd34d;color:#92400e">⏳ Morno</button>
          <button class="topt" id="t-f" onclick="setTemp('Frio ❄️')" style="background:#dbeafe;border-color:#93c5fd;color:#1e3a8a">❄️ Frio</button>
        </div>
        <input type="hidden" id="r-temperatura" value="Morno ⏳">
      </div>
    </div>

    <div class="sec">
      <div class="stitle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,4 8,10 14,4"/><rect x="2" y="4" width="12" height="9" rx="1"/></svg>Próximos passos</div>
      <div class="field">
        <label>Próximo passo definido</label>
        <input type="text" id="r-proximo" placeholder="Ex: Enviar proposta de energia até quinta">
      </div>
      <div class="field">
        <label>Data de retorno</label>
        <input type="date" id="r-retorno">
      </div>
      <div class="field">
        <label>Observações da reunião</label>
        <textarea id="r-obs" placeholder="Informações importantes sobre o cliente, pontos levantados, contexto..."></textarea>
      </div>
    </div>

    <button class="sbtn gold" onclick="salvarReuniao()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V5l-3-3z"/><polyline points="9,2 9,6 13,6"/><line x1="5" y1="10" x2="11" y2="10"/></svg>
      Registrar reunião
    </button>
    <div class="success-msg" id="reuniao-ok"></div>

  </div>

</div>

<script>
function setTemp(val) {
  document.getElementById('r-temperatura').value = val;
  ['t-q','t-m','t-f'].forEach(id => {
    document.getElementById(id).style.opacity = '0.45';
  });
  const map = {'Quente 🔥':'t-q','Morno ⏳':'t-m','Frio ❄️':'t-f'};
  if(map[val]) document.getElementById(map[val]).style.opacity = '1';
}
</script>
</body>
</html>
